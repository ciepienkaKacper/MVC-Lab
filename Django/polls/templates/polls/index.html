<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ankiety</title>
</head>
<body>
    <header>
        <h1>Polls</h1>
    </header>

    <main>
        {% if latest_question_list %}
            <ul>
            {% for question in latest_question_list %}
                <li><a href="{% url 'polls:detail' question.id %}">{{ question.question_text }}</a></li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No polls are available.</p>
        {% endif %}
    </main>
    <footer>
        <p>&copy; 2026 Kacpr</p>
    </footer>
</body>
</html>
